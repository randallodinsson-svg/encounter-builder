<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXOPS + APEXAI Scenario Browser v2</title>
</head>

<body style="margin:0; background:#111; color:#eee; font-family:monospace;">

<!-- ========================================================= -->
<!--  FULL PAGE LAYOUT: SIDEBAR + INSPECTOR                    -->
<!-- ========================================================= -->
<div id="apex-layout" style="display:flex; height:100vh;">

    <!-- LEFT SIDEBAR: AI Scenario Browser v2 -->
    <div id="apex-sidebar" style="
        width:320px;
        border-right:1px solid #333;
        padding:15px;
        overflow-y:auto;
        background:#111;
    ">
        <h2 style="margin-top:0;">AI Scenario Browser</h2>

        <button id="ai-generate-btn" style="
            margin-bottom:10px;
            width:100%;
            padding:8px;
            background:#222;
            color:#eee;
            border:1px solid #444;
            cursor:pointer;
        ">Generate Scenarios</button>

        <div style="margin-bottom:10px;">
            <label for="ai-filter" style="font-size:12px; color:#aaa;">Filter by difficulty:</label>
            <select id="ai-filter" style="
                width:100%;
                padding:6px;
                background:#181818;
                color:#eee;
                border:1px solid #444;
                margin-top:4px;
            ">
                <option value="all">All</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <div id="ai-scenario-list"></div>
    </div>

    <!-- RIGHT PANEL: APEXOPS Inspector -->
    <div id="apexops-root" style="flex:1; overflow-y:auto;"></div>

</div>


<!-- ========================================================= -->
<!--  SCRIPT: APEXCORE + APEXAI + APEXSIM + APEXOPS            -->
<!-- ========================================================= -->
<script type="module">
    import { ApexSim, MinimalTestScenarioV1 } from './apexsim.js';
    import { ApexOps } from './apexops.js';
    import { ApexCore } from './apexcore.js';
    import { ApexAI } from './apexai.js';

    // CORE + AI + OPS
    const core = new ApexCore();
    const ai = new ApexAI(core);
    const ops = new ApexOps("apexops-root", () => new ApexSim(MinimalTestScenarioV1));

    core.registerModule("ops", ops);

    // Load default scenario
    core.loadScenario(MinimalTestScenarioV1);
    const initialResult = core.startSimulation((scenario) => new ApexSim(scenario));
    ops.loadSimulationResult(initialResult);

    // ------------------------------------------------------
    // SCENARIO BROWSER v2 LOGIC
    // ------------------------------------------------------

    const scenarioListEl = document.getElementById("ai-scenario-list");
    const generateBtn = document.getElementById("ai-generate-btn");
    const filterSelect = document.getElementById("ai-filter");

    let scenarios = [];
    let currentFilter = "all";

    function classifyDifficulty(distance) {
        if (distance <= 6) return "easy";
        if (distance <= 8) return "medium";
        return "hard";
    }

    function difficultyColor(diff) {
        if (diff === "easy") return "#3fa34d";
        if (diff === "medium") return "#e0a93b";
        return "#d9534f";
    }

    // Render a single scenario card
    function renderScenarioCard(scenario) {
        const distance = scenario.actors[0].attributes.targetPosition;
        const speed = scenario.actors[0].speed;
        const accel = scenario.actors[0].acceleration;
        const diff = scenario.difficulty || classifyDifficulty(distance);

        const card = document.createElement("div");
        card.style.border = "1px solid #444";
        card.style.padding = "10px";
        card.style.marginBottom = "10px";
        card.style.background = "#181818";

        const runId = `run-${scenario.id}`;

        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                <strong style="font-size:13px;">${scenario.label}</strong>
                <span style="
                    font-size:11px;
                    padding:2px 6px;
                    border-radius:10px;
                    background:${difficultyColor(diff)};
                    color:#fff;
                ">${diff.toUpperCase()}</span>
            </div>
            <small>ID: ${scenario.id}</small><br>
            <small>Distance: ${distance}</small><br>
            <small>Speed: ${speed}</small><br>
            <small>Accel: ${accel}</small><br>
            <button id="${runId}" style="
                margin-top:10px;
                width:100%;
                padding:6px;
                background:#222;
                color:#eee;
                border:1px solid #444;
                cursor:pointer;
            ">Run</button>
        `;

        scenarioListEl.appendChild(card);

        document.getElementById(runId).addEventListener("click", () => {
            core.loadScenario(scenario);
            const result = core.startSimulation((scenario) => new ApexSim(scenario));
            ops.loadSimulationResult(result);

            const analysis = ai.evaluateResult(result);
            const outcomeEl = document.getElementById("ops-outcome");
            outcomeEl.innerHTML += `
                <h3>AI Analysis</h3>
                <pre>${JSON.stringify(analysis, null, 2)}</pre>
            `;
        });
    }

    function renderScenarioList() {
        scenarioListEl.innerHTML = "";

        const filtered = scenarios.filter(s => {
            if (currentFilter === "all") return true;
            return s.difficulty === currentFilter;
        });

        filtered.forEach(renderScenarioCard);
    }

    // Generate multiple scenarios
    generateBtn.addEventListener("click", () => {
        scenarios = [];

        const count = 8; // number of scenarios to generate
        for (let i = 0; i < count; i++) {
            const distanceToSafety = 5 + Math.floor(Math.random() * 8); // 5–12
            const civilianSpeed = 1;
            const civilianAcceleration = 1;

            const scenario = ai.generateEvacScenario({
                id: `ai_scenario_${Date.now()}_${i}`,
                label: `AI Evac Scenario #${i + 1}`,
                distanceToSafety,
                civilianSpeed,
                civilianAcceleration,
                maxTicks: 25
            });

            scenario.difficulty = classifyDifficulty(distanceToSafety);
            scenarios.push(scenario);
        }

        // sort by distance (ascending)
        scenarios.sort((a, b) =>
            a.actors[0].attributes.targetPosition - b.actors[0].attributes.targetPosition
        );

        renderScenarioList();
    });

    // Filter change
    filterSelect.addEventListener("change", () => {
        currentFilter = filterSelect.value;
        renderScenarioList();
    });
</script>

</body>
</html>
