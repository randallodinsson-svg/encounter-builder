<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>APEXOPS – Diagnostics Console</title>

  <style>
    body {
      margin: 0;
      background: #0b0d11;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
    }
    #wrap {
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 200px;
      background: #050608;
      padding: 15px;
      border-right: 1px solid #1a202c;
    }
    #sidebar h1 {
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    #main {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .metric-box {
      background: #11141a;
      padding: 10px;
      border: 1px solid #2d3748;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    .metric-box h2 {
      font-size: 12px;
      text-transform: uppercase;
      margin: 0 0 6px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      border-bottom: 1px solid #2d3748;
      padding: 6px;
      font-size: 12px;
    }
    th {
      text-transform: uppercase;
      font-size: 10px;
      color: #a0aec0;
    }

    /* Registry Diff Panel Styling */
    #diffAdded li,
    #diffChanged li,
    #diffRemoved li {
      font-size: 12px;
      padding: 2px 0;
      color: #cbd5e1;
    }

    #diffAdded li { color: #4ade80; }     /* green */
    #diffChanged li { color: #facc15; }   /* yellow */
    #diffRemoved li { color: #f87171; }   /* red */

    /* Timeline Panel Styling */
    #timelineList {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }
    #timelineList li {
      font-size: 12px;
      padding: 4px 0;
      border-bottom: 1px solid #1f2933;
      color: #cbd5e1;
    }
    #timelineList li span {
      display: inline-block;
      margin-right: 8px;
    }
    .tl-tick {
      color: #93c5fd;
      min-width: 60px;
    }
    .tl-time {
      color: #a5b4fc;
      min-width: 80px;
    }
    .tl-dur {
      color: #fbbf24;
      min-width: 70px;
    }
    .tl-reg {
      color: #9ca3af;
    }
  </style>
</head>
<body>

<div id="wrap">
  <div id="sidebar">
    <h1>APEXOPS</h1>
    <p>Diagnostics Console</p>
  </div>

  <div id="main">

    <!-- GLOBAL TICK METRICS -->
    <div class="metric-box">
      <h2>Global Tick Metrics</h2>
      <div>Ticks: <span id="ticks">–</span></div>
      <div>Last Tick: <span id="last">–</span> ms</div>
      <div>Min: <span id="min">–</span> ms</div>
      <div>Max: <span id="max">–</span> ms</div>
      <div>Avg: <span id="avg">–</span> ms</div>
    </div>

    <!-- PER-MODULE COST -->
    <div class="metric-box">
      <h2>Per‑Module Cost</h2>
      <table>
        <thead>
          <tr>
            <th>Module</th>
            <th>Last</th>
            <th>Avg</th>
          </tr>
        </thead>
        <tbody id="moduleTable"></tbody>
      </table>
    </div>

    <!-- REGISTRY DIFF PANEL -->
    <div class="metric-box">
      <h2>Registry Diff (This Tick)</h2>

      <div>
        <strong>Added Keys:</strong>
        <ul id="diffAdded"></ul>
      </div>

      <div style="margin-top:10px;">
        <strong>Changed Keys:</strong>
        <ul id="diffChanged"></ul>
      </div>

      <div style="margin-top:10px;">
        <strong>Removed Keys:</strong>
        <ul id="diffRemoved"></ul>
      </div>
    </div>

    <!-- TIMELINE PANEL -->
    <div class="metric-box">
      <h2>Tick Timeline</h2>
      <ul id="timelineList"></ul>
    </div>

  </div>
</div>

<script>
/* Pull snapshot from engine */
function getRegistrySnapshot() {
  return window.APEXCORE_SNAPSHOT || null;
}

/* Registry Diff Panel */
function updateRegistryDiff(snap) {
  const diff = snap.regdiff?.diff;
  if (!diff) return;

  const added = diff.added || {};
  const changed = diff.changed || {};
  const removed = diff.removed || {};

  const addedList = document.getElementById("diffAdded");
  const changedList = document.getElementById("diffChanged");
  const removedList = document.getElementById("diffRemoved");

  addedList.innerHTML = "";
  changedList.innerHTML = "";
  removedList.innerHTML = "";

  for (const key in added) {
    const li = document.createElement("li");
    li.textContent = `${key}: ${JSON.stringify(added[key])}`;
    addedList.appendChild(li);
  }

  for (const key in changed) {
    const li = document.createElement("li");
    const before = JSON.stringify(changed[key].before);
    const after = JSON.stringify(changed[key].after);
    li.textContent = `${key}: ${before} → ${after}`;
    changedList.appendChild(li);
  }

  for (const key in removed) {
    const li = document.createElement("li");
    li.textContent = key;
    removedList.appendChild(li);
  }
}

/* Timeline Panel */
function updateTimeline(snap) {
  const timeline = snap.timeline;
  const list = document.getElementById("timelineList");
  list.innerHTML = "";

  if (!timeline || !Array.isArray(timeline.events)) return;

  // Show most recent first, limit to last 20
  const events = [...timeline.events].slice(-20).reverse();

  for (const ev of events) {
    const li = document.createElement("li");

    const tickSpan = document.createElement("span");
    tickSpan.className = "tl-tick";
    tickSpan.textContent = `#${ev.tick}`;

    const timeSpan = document.createElement("span");
    timeSpan.className = "tl-time";
    timeSpan.textContent = `${ev.time.toFixed ? ev.time.toFixed(1) : ev.time}`;

    const durSpan = document.createElement("span");
    durSpan.className = "tl-dur";
    const d = ev.durationMs;
    durSpan.textContent = d == null ? "– ms" : `${d.toFixed(2)} ms`;

    const regSpan = document.createElement("span");
    regSpan.className = "tl-reg";
    const reg = ev.registry || {};
    regSpan.textContent = `Δ registry: +${reg.added ?? 0} / ~${reg.changed ?? 0} / -${reg.removed ?? 0}`;

    li.appendChild(tickSpan);
    li.appendChild(timeSpan);
    li.appendChild(durSpan);
    li.appendChild(regSpan);

    list.appendChild(li);
  }
}

/* Update UI */
function updateUI() {
  const snap = getRegistrySnapshot();
  if (!snap) return;

  // Global metrics
  document.getElementById("ticks").textContent = snap.profiler?.ticks ?? "–";
  document.getElementById("last").textContent = snap.profiler?.lastTickDuration?.toFixed(2) ?? "–";
  document.getElementById("min").textContent = snap.profiler?.minMs?.toFixed(2) ?? "–";
  document.getElementById("max").textContent = snap.profiler?.maxMs?.toFixed(2) ?? "–";
  document.getElementById("avg").textContent = snap.profiler?.avgMs?.toFixed(2) ?? "–";

  // Module table
  const table = document.getElementById("moduleTable");
  table.innerHTML = "";

  const mods = snap.modprofiler || {};
  for (const key in mods) {
    const m = mods[key];
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${key}</td>
      <td>${m.lastMs?.toFixed(2) ?? "–"}</td>
      <td>${m.avgMs?.toFixed(2) ?? "–"}</td>
    `;
    table.appendChild(row);
  }

  // Registry Diff Panel
  updateRegistryDiff(snap);

  // Timeline Panel
  updateTimeline(snap);
}

setInterval(updateUI, 300);
</script>

</body>
</html>
