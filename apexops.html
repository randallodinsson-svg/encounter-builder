<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXOPS v2 — Runtime Inspector</title>

    <style>
        body {
            margin: 0;
            background: #0b0e13;
            color: #e6eef7;
            font-family: system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 320px;
            background: #11161d;
            border-right: 1px solid #1f2732;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            letter-spacing: 0.5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            background: #1e90ff;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #3aa0ff;
        }

        .section {
            margin-bottom: 25px;
        }

        #output {
            flex: 1;
            background: #0f141a;
            border-top: 1px solid #1f2732;
            padding: 15px;
            font-family: Consolas, monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .panel {
            background: #1a212c;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .panel h3 {
            margin: 0 0 6px 0;
            font-size: 15px;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>APEXOPS — Runtime Inspector</h2>

        <div class="section">
            <button id="btnStart">Start OPS Loop</button>
            <button id="btnStop">Stop OPS Loop</button>
            <button id="btnStep">Step Once</button>
        </div>

        <div class="section">
            <h3>Panels</h3>
            <button id="btnToggleActors">Toggle Actor Panel</button>
            <button id="btnToggleTimeline">Toggle Timeline Panel</button>
        </div>

        <div class="section">
            <button id="btnCopy">Copy Output</button>
            <button id="btnExport">Export JSON</button>
        </div>
    </div>

    <div id="main">
        <div id="output">APEXOPS v2 ready.</div>
    </div>

    <script type="module">
        import { APEXCORE } from "./apexcore.js";
        import { APEXSIM } from "./apexsim.js";
        import { APEXOPS } from "./apexops.js";
        import { APEXAI } from "./apexai.js";

        const out = document.getElementById("output");

        function log(msg) {
            out.textContent += "\\n" + msg;
            out.scrollTop = out.scrollHeight;
        }

        /* ------------------------------------------------------------
           REGISTER MODULES
        ------------------------------------------------------------ */
        APEXCORE.registerModule("APEXSIM", APEXSIM);
        APEXCORE.registerModule("APEXOPS", APEXOPS);
        APEXCORE.registerModule("APEXAI", APEXAI);

        APEXCORE.init();
        log("APEXCORE initialized.");

        /* ------------------------------------------------------------
           OPS LOOP CONTROL
        ------------------------------------------------------------ */
        let loop = null;

        document.getElementById("btnStart").onclick = () => {
            if (loop) return;
            loop = setInterval(() => {
                const result = APEXCORE.runOpsStep();
                log("OPS Update:");
                log(JSON.stringify(result, null, 2));
            }, 500);
            log("OPS Loop started.");
        };

        document.getElementById("btnStop").onclick = () => {
            if (!loop) return;
            clearInterval(loop);
            loop = null;
            log("OPS Loop stopped.");
        };

        document.getElementById("btnStep").onclick = () => {
            const result = APEXCORE.runOpsStep();
            log("OPS Step:");
            log(JSON.stringify(result, null, 2));
        };

        /* ------------------------------------------------------------
           PANELS (PLACEHOLDERS)
        ------------------------------------------------------------ */
        document.getElementById("btnToggleActors").onclick = () => {
            log("Actor Panel toggled (placeholder).");
        };

        document.getElementById("btnToggleTimeline").onclick = () => {
            log("Timeline Panel toggled (placeholder).");
        };

        /* ------------------------------------------------------------
           COPY / EXPORT
        ------------------------------------------------------------ */
        document.getElementById("btnCopy").onclick = () => {
            navigator.clipboard.writeText(out.textContent);
            log("Output copied to clipboard.");
        };

        document.getElementById("btnExport").onclick = () => {
            const data = out.textContent;
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "apexops_output.json";
            a.click();

            URL.revokeObjectURL(url);
            log("Exported JSON file.");
        };
    </script>

</body>
</html>
