<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>APEXOPS Runtime Inspector</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: monospace;
    }
    #apexops-root {
      width: 100vw;
      height: 100vh;
      overflow-y: auto;
      padding: 20px;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div id="apexops-root"></div>

  <script type="module">
    import { ApexSim, MinimalTestScenarioV1 } from './apexsim.js';
    import { ApexOps } from './apexops.js';

    // Run the simulation
    const sim = new ApexSim(MinimalTestScenarioV1);
    const result = sim.start();

    // Render the inspector
    const ops = new ApexOps("apexops-root");
    ops.loadSimulationResult(result);
  </script>
</body>
</html>
