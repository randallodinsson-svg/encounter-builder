<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXOPS Runtime Inspector</title>

    <style>
        body {
            background: #000;
            color: #eee;
            font-family: "Segoe UI", sans-serif;
            padding: 20px;
        }

        #out {
            white-space: pre-wrap;
            background: #111;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 6px;
            margin-top: 20px;
        }

        button {
            padding: 8px 14px;
            margin-right: 10px;
            background: #0af;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #000;
            font-weight: 600;
        }

        /* Diagnostics Shell */
        #apexops-diagnostics {
            padding: 20px;
            background: #111;
            color: #eee;
            border: 1px solid #333;
            margin-top: 20px;
            border-radius: 6px;
        }

        #apexops-diagnostics h2 {
            margin: 0 0 10px 0;
            color: #0af;
        }

        #ops-panels {
            margin-top: 10px;
        }

        /* Panel Base Style */
        .ops-panel {
            background: #000;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .ops-panel h3 {
            margin-top: 0;
            color: #0af;
        }

        .ops-panel pre {
            white-space: pre-wrap;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>

<body>

    <h1>APEXOPS Runtime Inspector</h1>

    <button id="btnOpsTick">Run Tick</button>
    <button id="btnOpsClear">Clear Output</button>

    <div id="out">APEXOPS ready.</div>

    <script type="module">
        import { APEXCORE } from "./apexcore.js";
        import { APEXOPS } from "./apexops.js";

        const out = document.getElementById("out");

        function log(msg) {
            out.textContent += "\n" + msg;
        }

        // Initialize OPS
        APEXOPS.init(APEXCORE);
        APEXOPS.attachEventHooks();

        // Update Core Logs Panel
        function updateCoreLogs() {
            const logs = APEXOPS.getCoreLogs();
            const el = document.getElementById("ops-logs");
            el.textContent = logs.join("\n");
        }

        // Update Core Errors Panel
        function updateCoreErrors() {
            const errors = APEXOPS.getCoreErrors();
            const el = document.getElementById("ops-errors");

            if (errors.length === 0) {
                el.textContent = "(no errors)";
                return;
            }

            el.textContent = errors
                .map(err => `[${new Date(err.timestamp).toLocaleTimeString()}] ${err.context}: ${err.error}`)
                .join("\n");
        }

        // Update Lifecycle History Panel
        function updateLifecycleHistory() {
            const history = APEXOPS.getLifecycleHistory();
            const el = document.getElementById("ops-lifecycle");

            if (history.length === 0) {
                el.textContent = "(no lifecycle events)";
                return;
            }

            el.textContent = history
                .map(ev => `[${new Date(ev.timestamp).toLocaleTimeString()}] ${ev.type.toUpperCase()} — ${ev.name}`)
                .join("\n");
        }

        // Tick button
        document.getElementById("btnOpsTick").onclick = () => {
            const tick = {
                time: Date.now(),
                random: Math.random()
            };

            const ops = APEXOPS.inspectRuntime(tick);

            log("SIMULATION TICK:");
            log(JSON.stringify(tick, null, 2));

            log("OPS INSPECTION:");
            log(JSON.stringify(ops, null, 2));

            updateCoreLogs();
            updateCoreErrors();
            updateLifecycleHistory();
        };

        // Clear button
        document.getElementById("btnOpsClear").onclick = () => {
            out.textContent = "APEXOPS ready.";
        };
    </script>

    <!-- APEXOPS Diagnostics Shell -->
    <div id="apexops-diagnostics">
        <h2>APEXOPS Diagnostics</h2>

        <div id="ops-panels">

            <!-- Core Logs Panel -->
            <div id="ops-panel-logs" class="ops-panel">
                <h3>Core Logs</h3>
                <pre id="ops-logs">(no logs yet)</pre>
            </div>

            <!-- Core Errors Panel -->
            <div id="ops-panel-errors" class="ops-panel">
                <h3>Core Errors</h3>
                <pre id="ops-errors">(no errors)</pre>
            </div>

            <!-- Lifecycle History Panel -->
            <div id="ops-panel-lifecycle" class="ops-panel">
                <h3>Lifecycle History</h3>
                <pre id="ops-lifecycle">(no lifecycle events)</pre>
            </div>

        </div>
    </div>

</body>
</html>
