<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXOPS — Runtime Inspector</title>

    <style>
        body {
            margin: 0;
            background: #0b0e13;
            color: #e6eef7;
            font-family: system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            background: #11161d;
            border-right: 1px solid #1f2732;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            background: #1e90ff;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #3aa0ff;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #opsOutput {
            flex: 1;
            background: #05070a;
            padding: 12px;
            box-sizing: border-box;
            font-family: Consolas, monospace;
            font-size: 13px;
            overflow-y: auto;
            white-space: pre-wrap;
            border-top: 1px solid #1f2732;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>APEXOPS — Runtime Inspector</h2>

        <button id="btnPing">Ping Core</button>
        <button id="btnSimTick">Run Simulation Tick</button>
        <button id="btnOpsClear">Clear Output</button>
    </div>

    <div id="main">
        <div id="opsOutput">APEXOPS v2 ready.</div>
    </div>

    <script type="module">
        import { APEXCORE } from "./apexcore.js";
        import { APEXSIM } from "./apexsim.js";
        import { APEXOPS } from "./apexops.js";

        const out = document.getElementById("opsOutput");

        function log(x) {
            out.textContent += "\n" + x;
            out.scrollTop = out.scrollHeight;
        }

        document.getElementById("btnPing").onclick = () => {
            const result = APEXCORE.ping();
            log("CORE PING:");
            log(JSON.stringify(result, null, 2));
        };

        document.getElementById("btnSimTick").onclick = () => {
            const tick = APEXSIM.tick();
            const ops = APEXOPS.inspect(tick);

            log("SIMULATION TICK:");
            log(JSON.stringify(tick, null, 2));

            log("OPS INSPECTION:");
            log(JSON.stringify(ops, null, 2));
        };

        document.getElementById("btnOpsClear").onclick = () => {
            out.textContent = "APEXOPS v2 ready.";
        };
    </script>

</body>
</html>
