<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>APEXOPS — Runtime Inspector</title>
</head>

<body style="margin:0; background:#050608; color:#e5e5e5; font-family:monospace;">

<!-- HEADER -->
<div style="padding:8px 12px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center; background:#080a0d;">
  <div>
    <span style="font-weight:bold;">APEXOPS — RUNTIME INSPECTOR</span>
    <span style="color:#888; margin-left:8px;">v2</span>
  </div>
  <div style="font-size:12px; color:#aaa;">
    Mode: <span style="color:#6cf;">Studio / Dev</span> · Status: <span style="color:#6f6;">ONLINE</span>
  </div>
</div>

<!-- LAYOUT -->
<div style="display:flex; height:calc(100vh - 40px);">

  <!-- LEFT: CONTROLS -->
  <div style="width:240px; border-right:1px solid #222; padding:12px; background:#050608;">
    <div style="font-size:11px; color:#888; margin-bottom:6px;">SIMULATION CONTROLS</div>

    <button id="ops-run-btn"
      style="width:100%; font-size:12px; padding:6px 8px; border:1px solid #2a6; background:#041a0f; color:#e5e5e5; cursor:pointer; margin-bottom:6px;">
      Run Simulation
    </button>

    <button id="ops-step-btn"
      style="width:100%; font-size:12px; padding:6px 8px; border:1px solid #264a6a; background:#041326; color:#e5e5e5; cursor:pointer; margin-bottom:6px;">
      Step Tick
    </button>

    <button id="ops-reset-btn"
      style="width:100%; font-size:12px; padding:6px 8px; border:1px solid #6a2626; background:#260404; color:#e5e5e5; cursor:pointer;">
      Reset
    </button>

    <div style="margin-top:20px; font-size:11px; color:#888;">ACTIVE SCENARIO</div>
    <div id="ops-scenario-meta" style="font-size:11px; color:#ccc; margin-top:4px;"></div>
  </div>

  <!-- CENTER: WORKSPACE -->
  <div style="flex:1; border-right:1px solid #222; padding:12px; background:#07090c;">
    <div style="font-size:11px; color:#888; margin-bottom:4px;">SIMULATION OUTPUT</div>
    <div id="ops-output"
      style="border:1px solid #222; padding:12px; background:#050608; height:100%; overflow:auto; white-space:pre; font-size:12px;">
      No simulation run yet.
    </div>
  </div>

  <!-- RIGHT: SYSTEM LOG -->
  <div style="width:320px; padding:12px; background:#050608;">
    <div style="font-size:11px; color:#888; margin-bottom:4px;">SYSTEM LOG</div>
    <div id="ops-log"
      style="border:1px solid #222; padding:8px; background:#07090c; height:100%; overflow:auto; font-size:11px;"></div>
  </div>

</div>

<!-- SCRIPT -->
<script type="module">
  /* ------------------------------------------------------------
     IMPORT MODULES
     ------------------------------------------------------------ */
  import { createApexCore } from './apexcore.js';
  import { ApexSim, MinimalTestScenarioV1 } from './apexsim.js';
  import { createApexAI } from './apexai.js';

  /* ------------------------------------------------------------
     INITIALIZE CORE + AI
     ------------------------------------------------------------ */
  const core = createApexCore();
  const ai = createApexAI(core);

  /* ------------------------------------------------------------
     DOM ELEMENTS
     ------------------------------------------------------------ */
  const runBtn = document.getElementById("ops-run-btn");
  const stepBtn = document.getElementById("ops-step-btn");
  const resetBtn = document.getElementById("ops-reset-btn");
  const outputEl = document.getElementById("ops-output");
  const logEl = document.getElementById("ops-log");
  const metaEl = document.getElementById("ops-scenario-meta");

  /* ------------------------------------------------------------
     LOGGING
     ------------------------------------------------------------ */
  function log(msg) {
    const ts = new Date().toISOString().split("T")[1].split(".")[0];
    const div = document.createElement("div");
    div.textContent = `[${ts}] ${msg}`;
    logEl.prepend(div);
  }

  /* ------------------------------------------------------------
     LOAD DEFAULT SCENARIO
     ------------------------------------------------------------ */
  core.loadScenario(MinimalTestScenarioV1);
  metaEl.textContent = `ID: ${core.activeScenario.id}`;

  /* ------------------------------------------------------------
     RUN SIMULATION
     ------------------------------------------------------------ */
  runBtn.addEventListener("click", () => {
    log("Running full simulation…");

    const result = core.startSimulation(s => new ApexSim(s));

    outputEl.textContent = JSON.stringify(result, null, 2);
    log("Simulation complete.");
  });

  /* ------------------------------------------------------------
     STEP TICK (if supported)
     ------------------------------------------------------------ */
  stepBtn.addEventListener("click", () => {
    log("Step‑tick requested.");

    // If ApexSim supports step() in future versions, hook here.
    outputEl.textContent = "Step mode not implemented in this scenario.";
  });

  /* ------------------------------------------------------------
     RESET
     ------------------------------------------------------------ */
  resetBtn.addEventListener("click", () => {
    log("Resetting scenario…");

    core.loadScenario(MinimalTestScenarioV1);
    metaEl.textContent = `ID: ${core.activeScenario.id}`;
    outputEl.textContent = "No simulation run yet.";
  });

  /* ------------------------------------------------------------
     EVENT HOOKS
     ------------------------------------------------------------ */
  core.on("simulation:start", () => log("Simulation started."));
  core.on("simulation:complete", () => log("Simulation completed."));
  core.on("scenario:loaded", sc => log(`Scenario loaded: ${sc.id}`));

  log("APEXOPS Runtime Inspector initialized.");
</script>

</body>
</html>
