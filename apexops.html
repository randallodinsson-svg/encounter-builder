<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>APEXOPS – Tick Profiler</title>

  <style>
    body {
      margin: 0;
      background: #0b0d11;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
    }
    #wrap {
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 200px;
      background: #050608;
      padding: 15px;
      border-right: 1px solid #1a202c;
    }
    #sidebar h1 {
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    #main {
      flex: 1;
      padding: 20px;
    }
    .metric-box {
      background: #11141a;
      padding: 10px;
      border: 1px solid #2d3748;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .metric-box h2 {
      font-size: 12px;
      text-transform: uppercase;
      margin: 0 0 6px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      border-bottom: 1px solid #2d3748;
      padding: 6px;
      font-size: 12px;
    }
    th {
      text-transform: uppercase;
      font-size: 10px;
      color: #a0aec0;
    }
  </style>
</head>
<body>

<div id="wrap">
  <div id="sidebar">
    <h1>APEXOPS</h1>
    <p>Tick Profiler</p>
  </div>

  <div id="main">
    <div class="metric-box">
      <h2>Global Tick Metrics</h2>
      <div>Ticks: <span id="ticks">–</span></div>
      <div>Last Tick: <span id="last">–</span> ms</div>
      <div>Min: <span id="min">–</span> ms</div>
      <div>Max: <span id="max">–</span> ms</div>
      <div>Avg: <span id="avg">–</span> ms</div>
    </div>

    <div class="metric-box">
      <h2>Per‑Module Cost</h2>
      <table>
        <thead>
          <tr>
            <th>Module</th>
            <th>Last</th>
            <th>Avg</th>
          </tr>
        </thead>
        <tbody id="moduleTable"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
/* Replace this later with your real engine snapshot */
function getRegistrySnapshot() {
  return window.APEXCORE_SNAPSHOT || null;
}

function updateUI() {
  const snap = getRegistrySnapshot();
  if (!snap) return;

  document.getElementById("ticks").textContent = snap.profiler?.ticks ?? "–";
  document.getElementById("last").textContent = snap.profiler?.lastTickDuration?.toFixed(2) ?? "–";
  document.getElementById("min").textContent = snap.profiler?.minMs?.toFixed(2) ?? "–";
  document.getElementById("max").textContent = snap.profiler?.maxMs?.toFixed(2) ?? "–";
  document.getElementById("avg").textContent = snap.profiler?.avgMs?.toFixed(2) ?? "–";

  const table = document.getElementById("moduleTable");
  table.innerHTML = "";

  const mods = snap.modprofiler || {};
  for (const key in mods) {
    const m = mods[key];
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${key}</td>
      <td>${m.lastMs?.toFixed(2) ?? "–"}</td>
      <td>${m.avgMs?.toFixed(2) ?? "–"}</td>
    `;
    table.appendChild(row);
  }
}

setInterval(updateUI, 300);
</script>

</body>
</html>
