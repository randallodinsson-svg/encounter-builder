<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXAI v3 — Scenario Engine</title>

    <style>
        body {
            margin: 0;
            background: #0b0e13;
            color: #e6eef7;
            font-family: system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 280px;
            background: #11161d;
            border-right: 1px solid #1f2732;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #sidebar h2 {
            margin-top: 0;
            font-size: 20px;
            letter-spacing: 0.5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            background: #1e90ff;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #3aa0ff;
        }

        .section {
            margin-bottom: 20px;
        }

        .difficulty-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .difficulty-btn {
            width: 100%;
            padding: 8px;
            font-size: 13px;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: row;
        }

        #leftPanel {
            width: 320px;
            border-right: 1px solid #1f2732;
            background: #0f141a;
            display: flex;
            flex-direction: column;
        }

        #scenarioListHeader {
            padding: 10px 12px;
            border-bottom: 1px solid #1f2732;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        #scenarioList {
            flex: 1;
            overflow-y: auto;
        }

        .scenario-item {
            padding: 8px 12px;
            border-bottom: 1px solid #1f2732;
            cursor: pointer;
        }

        .scenario-item:hover {
            background: #151b24;
        }

        .scenario-item-title {
            font-size: 14px;
        }

        .scenario-item-meta {
            font-size: 11px;
            opacity: 0.7;
        }

        #rightPanel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #detailPanel {
            height: 220px;
            border-bottom: 1px solid #1f2732;
            background: #0f141a;
            padding: 12px;
            box-sizing: border-box;
            font-family: Consolas, monospace;
            font-size: 13px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        #output {
            flex: 1;
            background: #05070a;
            padding: 12px;
            box-sizing: border-box;
            font-family: Consolas, monospace;
            font-size: 13px;
            overflow-y: auto;
            white-space: pre-wrap;
            border-top: 1px solid #1f2732;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            opacity: 0.7;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>APEXAI — Scenario Engine</h2>

        <div class="section">
            <div class="label">Scenario Actions</div>
            <button id="btnGenerate">Generate Scenario</button>
            <button id="btnEvaluate">Evaluate Scenario</button>
            <button id="btnClearLog">Clear Output</button>
        </div>

        <div class="section">
            <div class="label">Difficulty</div>
            <div class="difficulty-row">
                <button class="difficulty-btn" data-diff="easy">Easy</button>
                <button class="difficulty-btn" data-diff="normal">Normal</button>
                <button class="difficulty-btn" data-diff="hard">Hard</button>
                <button class="difficulty-btn" data-diff="extreme">Extreme</button>
            </div>
        </div>

        <div class="section">
            <div class="label">History</div>
            <button id="btnClearHistory">Clear Scenario History</button>
        </div>
    </div>

    <div id="main">
        <div id="leftPanel">
            <div id="scenarioListHeader">Scenario History</div>
            <div id="scenarioList"></div>
        </div>

        <div id="rightPanel">
            <div id="detailPanel">Scenario detail will appear here.</div>
            <div id="output">APEXAI v3 ready.</div>
        </div>
    </div>

    <script type="module">
        import { APEXAI } from "./apexai.js";

        const outputEl = document.getElementById("output");
        const detailEl = document.getElementById("detailPanel");
        const listEl = document.getElementById("scenarioList");

        const history = [];

        function log(msg) {
            outputEl.textContent += "\\n" + msg;
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        function renderScenarioList() {
            listEl.innerHTML = "";
            if (history.length === 0) {
                const empty = document.createElement("div");
                empty.className = "scenario-item";
                empty.style.opacity = "0.6";
                empty.textContent = "No scenarios generated yet.";
                listEl.appendChild(empty);
                return;
            }

            history.slice().reverse().forEach((scenario) => {
                const item = document.createElement("div");
                item.className = "scenario-item";

                const title = document.createElement("div");
                title.className = "scenario-item-title";
                title.textContent = scenario.title;

                const meta = document.createElement("div");
                meta.className = "scenario-item-meta";
                meta.textContent =
                    `ID: ${scenario.id} • Diff: ${scenario.difficulty} • Enemies: ${scenario.enemyCount} ${scenario.enemyType}`;

                item.appendChild(title);
                item.appendChild(meta);

                item.onclick = () => {
                    showScenarioDetail(scenario);
                };

                listEl.appendChild(item);
            });
        }

        function showScenarioDetail(scenario) {
            detailEl.textContent =
                "Scenario Detail:\\n" +
                JSON.stringify(scenario, null, 2);
        }

        // Initial list render
        renderScenarioList();

        // Buttons
        document.getElementById("btnGenerate").onclick = () => {
            const scenario = APEXAI.generateScenario();
            history.push(scenario);

            log("Generated Scenario:");
            log(JSON.stringify(scenario, null, 2));

            renderScenarioList();
            showScenarioDetail(scenario);
        };

        document.getElementById("btnEvaluate").onclick = () => {
            const result = APEXAI.evaluateScenario();
            log("Evaluation Result:");
            log(JSON.stringify(result, null, 2));
        };

        document.getElementById("btnClearLog").onclick = () => {
            outputEl.textContent = "APEXAI v3 ready.";
        };

        document.getElementById("btnClearHistory").onclick = () => {
            history.length = 0;
            renderScenarioList();
            detailEl.textContent = "Scenario detail will appear here.";
            log("Scenario history cleared.");
        };

        // Difficulty buttons
        document.querySelectorAll(".difficulty-btn").forEach(btn => {
            btn.onclick = () => {
                const level = btn.getAttribute("data-diff");
                APEXAI.setDifficulty(level);
                log(`Difficulty set to: ${level}`);
            };
        });
    </script>

</body>
</html>
