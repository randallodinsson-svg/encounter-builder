<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXAI v3 — Scenario Engine</title>
    <style>
        body {
            margin: 0;
            background: #0b0e13;
            color: #e6eef7;
            font-family: system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 320px;
            background: #11161d;
            border-right: 1px solid #1f2732;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            letter-spacing: 0.5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            background: #1e90ff;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #3aa0ff;
        }

        .section {
            margin-bottom: 25px;
        }

        #output {
            flex: 1;
            background: #0f141a;
            border-top: 1px solid #1f2732;
            padding: 15px;
            font-family: Consolas, monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        #scenarioList {
            background: #0f141a;
            border: 1px solid #1f2732;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-size: 14px;
        }

        .scenarioItem {
            padding: 6px;
            margin-bottom: 6px;
            background: #1a212c;
            border-radius: 4px;
            cursor: pointer;
        }

        .scenarioItem:hover {
            background: #243040;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>APEXAI — Scenario Browser</h2>

        <div class="section">
            <button id="btnGenerate">Generate Scenario</button>
            <button id="btnEvaluate">Evaluate Scenario</button>
        </div>

        <div class="section">
            <h3>Difficulty Filter</h3>
            <button data-diff="easy">Easy</button>
            <button data-diff="normal">Normal</button>
            <button data-diff="hard">Hard</button>
            <button data-diff="extreme">Extreme</button>
        </div>

        <div class="section">
            <h3>Scenarios</h3>
            <div id="scenarioList"></div>
        </div>

        <div class="section">
            <button id="btnCopy">Copy Output</button>
            <button id="btnExport">Export JSON</button>
        </div>
    </div>

    <div id="main">
        <div id="output">APEXAI v3 ready.</div>
    </div>

    <script src="apexai.js"></script>
    <script>
        const out = document.getElementById("output");
        const list = document.getElementById("scenarioList");

        function log(msg) {
            out.textContent += "\\n" + msg;
            out.scrollTop = out.scrollHeight;
        }

        // Generate Scenario
        document.getElementById("btnGenerate").onclick = () => {
            const scenario = APEXAI.generateScenario();
            log("Generated Scenario:");
            log(JSON.stringify(scenario, null, 2));

            const item = document.createElement("div");
            item.className = "scenarioItem";
            item.textContent = scenario.title || "Untitled Scenario";
            item.onclick = () => {
                log("Selected Scenario:");
                log(JSON.stringify(scenario, null, 2));
            };
            list.appendChild(item);
        };

        // Evaluate Scenario
        document.getElementById("btnEvaluate").onclick = () => {
            const result = APEXAI.evaluateScenario();
            log("Evaluation Result:");
            log(JSON.stringify(result, null, 2));
        };

        // Difficulty Filters
        document.querySelectorAll("[data-diff]").forEach(btn => {
            btn.onclick = () => {
                const diff = btn.getAttribute("data-diff");
                APEXAI.setDifficulty(diff);
                log("Difficulty set to: " + diff);
            };
        });

        // Copy Output
        document.getElementById("btnCopy").onclick = () => {
            navigator.clipboard.writeText(out.textContent);
            log("Output copied to clipboard.");
        };

        // Export JSON
        document.getElementById("btnExport").onclick = () => {
            const data = out.textContent;
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "apexai_output.json";
            a.click();

            URL.revokeObjectURL(url);
            log("Exported JSON file.");
        };
    </script>

</body>
</html>
