<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXAI — Minimal Test</title>

    <style>
        body {
            background: #0b0e13;
            color: #e6eef7;
            font-family: system-ui, sans-serif;
            padding: 20px;
        }
        button {
            padding: 12px 20px;
            margin: 10px 0;
            background: #1e90ff;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #11161d;
            border: 1px solid #1f2732;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            min-height: 200px;
        }
    </style>
</head>

<body>

    <h1>APEXAI — Minimal Test Page</h1>

    <button id="btnGenerate">Generate Scenario</button>
    <button id="btnEvaluate">Evaluate Scenario</button>

    <div id="output">Output will appear here…</div>

    <script type="module">
        import { APEXAI } from "./apexai.js";

        const out = document.getElementById("output");

        function log(x) {
            out.textContent += "\\n" + x;
        }

        document.getElementById("btnGenerate").onclick = () => {
            const s = APEXAI.generateScenario();
            log("Generated Scenario:");
            log(JSON.stringify(s, null, 2));
        };

        document.getElementById("btnEvaluate").onclick = () => {
            const r = APEXAI.evaluateScenario();
            log("Evaluation Result:");
            log(JSON.stringify(r, null, 2));
        };
    </script>

</body>
</html>
