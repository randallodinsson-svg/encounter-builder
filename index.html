<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>APEXSIM v8 — Encounter Builder</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #050810;
    }
    #apex-canvas {
      display: block;
    }
  </style>

  <link rel="stylesheet" href="./apex-ui.css">
  <link rel="stylesheet" href="./core.css">
</head>

<body>
  <canvas id="apex-canvas"></canvas>

  <div id="apex-replay-ui"
       style="position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
              width:640px; padding:8px 12px;
              background:rgba(5,10,20,0.9); color:#9FA8B8;
              font-family:system-ui; font-size:12px;
              display:flex; align-items:center; gap:8px;
              border:1px solid rgba(255,255,255,0.08);">
    <button id="apex-replay-play"
            style="padding:4px 10px; background:#1E88E5; color:#fff; border:none; cursor:pointer;">
      Play
    </button>
    <button id="apex-replay-pause"
            style="padding:4px 10px; background:#263238; color:#fff; border:none; cursor:pointer;">
      Pause
    </button>
    <input id="apex-replay-scrub"
           type="range" min="0" max="1" step="0.001" value="0"
           style="flex:1;">
    <span id="apex-replay-time"
          style="min-width:120px; text-align:right;">
      00:00.0 / 00:00.0
    </span>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
