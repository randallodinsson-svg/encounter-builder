<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APEXCORE v4.2 — Encounter Builder</title>

    <!-- Core styling (optional, keep if you already use it) -->
    <link rel="stylesheet" href="core.css" />
</head>

<body style="margin:0; padding:0; overflow:hidden; background:black;">

    <!-- HALO Renderer Canvas -->
    <canvas id="haloCanvas"
        style="
            position:absolute;
            top:0;
            left:0;
            width:100vw;
            height:100vh;
            border:2px solid #00ff00;
            z-index:1;
            display:block;
        ">
    </canvas>

    <!-- Overlay Root -->
    <div id="app-root"
        style="
            position:absolute;
            top:0;
            left:0;
            width:100vw;
            height:100vh;
            pointer-events:none;
            z-index:9999;
        ">
    </div>

    <!-- Core -->
    <script src="core.js"></script>

    <!-- Renderer -->
    <script src="halo-renderer.js"></script>

    <!-- Systems -->
    <script src="entities.js"></script>
    <script src="formations.js"></script>
    <script src="formation-ai.js"></script>

    <!-- Auto-Spawn -->
    <script src="auto-spawn.js"></script>

    <!-- Overlay -->
    <script src="overlay.js"></script>

    <!-- Engine MUST be last -->
    <script src="engine.js"></script>

    <!-- Force engine start from HTML as primary trigger -->
    <script>
        (function () {
            const tryStartEngine = () => {
                const engine = window.APEX && APEX.get("engine");
                if (engine && typeof engine.start === "function") {
                    console.log("APEXCORE v4.2 — Forcing engine start from index.html");
                    engine.start();
                } else {
                    console.warn("Engine module not found when forcing start from index.html.");
                }
            };

            if (document.readyState === "complete" || document.readyState === "interactive") {
                tryStartEngine();
            } else {
                window.addEventListener("load", tryStartEngine);
            }
        })();
    </script>

</body>
</html>
