<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXSIM Tactical Encounter Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Optional: basic reset -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #05070b;
            color: #e5f0ff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 10px 16px;
            border-bottom: 1px solid #1b2230;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #070b12;
        }
        header button {
            background: #111827;
            color: #e5f0ff;
            border: 1px solid #1f2937;
            padding: 6px 12px;
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
        }
        header button:hover {
            background: #1b2333;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        canvas {
            background: #020308;
            border: 1px solid #1b2230;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <header>
        <button id="btn-hold">HOLD</button>
        <button id="btn-flank">FLANK</button>
        <button id="btn-fallback">FALLBACK</button>
        <button id="btn-regroup">REGROUP</button>
        <button id="btn-push">PUSH</button>
        <button id="btn-heatmap">HEATMAP</button>
    </header>

    <main>
        <canvas id="apex-canvas" width="1280" height="720"></canvas>
    </main>

    <!-- Module scripts -->
    <script type="module" src="./apexsim.js"></script>
    <script type="module" src="./apexsim-renderer.js"></script>
    <script type="module" src="./index.js"></script>
</body>
</html>
