<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APEXCORE v4.4 — HALO Crew Stable Build</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #app-root {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #haloCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* UI Deck container hook */
        #apex-ui-root {
            position: absolute;
            top: 0;
            right: 0;
            width: 320px;
            height: 100%;
            pointer-events: none; /* UI will manage its own hit areas */
        }
    </style>

    <!-- APEXCORE UI Deck styles -->
    <link rel="stylesheet" href="apex-ui.css?v=1">
</head>

<body>

    <!-- ROOT + CANVAS (renderer + overlay) -->
    <div id="app-root">
        <canvas id="haloCanvas"></canvas>

        <!-- APEXCORE UI Deck root -->
        <div id="apex-ui-root"></div>
    </div>

    <!-- Core -->
    <script src="core.js?v=2"></script>

    <!-- Renderer -->
    <script src="halo-renderer.js?v=2"></script>

    <!-- Systems -->
    <script src="entities.js?v=2"></script>
    <script src="formations.js?v=2"></script>
    <script src="formation-ai.js?v=2"></script>

    <!-- Auto-Spawn -->
    <script src="auto-spawn.js?v=2"></script>

    <!-- Overlay -->
    <script src="overlay.js?v=2"></script>

    <!-- APEXCORE UI Deck -->
    <script src="apex-ui.js?v=1"></script>

    <!-- Engine MUST be last -->
    <script src="engine.js?v=2"></script>

    <!-- Force engine start -->
    <script>
        (function () {
            const engine = APEX.get("engine");
            if (engine && typeof engine.start === "function") {
                console.log("APEXCORE v4.4 — Forcing engine start from index.html");
                engine.start();
            }
        })();
    </script>

</body>
</html>
