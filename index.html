<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXCORE — Simulation</title>

    <!-- Core styling -->
    <link rel="stylesheet" href="core.css" />
    <link rel="stylesheet" href="apex-ui.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }
    </style>
</head>

<body>

    <!-- UI Panel -->
    <div id="apex-ui"></div>

    <!-- CANVAS -->
    <canvas id="apex-canvas"></canvas>

    <script src="core.js"></script>
    <script src="engine.js"></script>

    <script src="apexsim.js"></script>
    <script src="apexsim-renderer.js"></script>

    <script src="overlay.js"></script>
    <script src="tick-profiler.js"></script>
    <script src="event-timeline-visualizer.js"></script>
    <script src="diag-fps-graph.js"></script>
