<script>
(function () {
  console.log("[APEXOPS] UI script loaded.");

  const nav = document.getElementById("apexops-nav");
  const panels = document.querySelectorAll(".apexops-panel");

  const regContainer = document.getElementById("registry-container");
  const profilerContainer = document.getElementById("profiler-container");

  const haloAgentCount = document.getElementById("halo-agent-count");
  const haloFormation = document.getElementById("halo-formation");
  const haloLastUpdate = document.getElementById("halo-last-update");

  // NEW: Manual formation buttons
  const btnRing = document.getElementById("halo-btn-ring");
  const btnDisk = document.getElementById("halo-btn-disk");
  const btnLane = document.getElementById("halo-btn-lane");

  function showPanel(id) {
    panels.forEach(p => p.classList.remove("active"));
    const target = document.getElementById(id);
    if (target) target.classList.add("active");

    nav.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
    const activeBtn = nav.querySelector(`button[data-panel="${id}"]`);
    if (activeBtn) activeBtn.classList.add("active");

    if (id === "panel-halo") {
      if (window.HALO_RENDERER && HALO_RENDERER.__forceResize) {
        console.log("[APEXOPS] HALO panel activated → forcing canvas resize");
        HALO_RENDERER.__forceResize();
      }
    }
  }

  nav.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-panel]");
    if (!btn) return;
    const panel = btn.getAttribute("data-panel");
    showPanel(panel);
  });

  // NEW: Manual formation control wiring
  function bindFormationButtons() {
    if (!window.HALO_RENDERER) return;

    btnRing.addEventListener("click", () => {
      HALO_RENDERER.setFormation("ring");
    });

    btnDisk.addEventListener("click", () => {
      HALO_RENDERER.setFormation("disk");
    });

    btnLane.addEventListener("click", () => {
      HALO_RENDERER.setFormation("lane");
    });
  }

  // Delay binding until renderer is mounted
  setTimeout(bindFormationButtons, 200);

  function renderRegistry() {
    if (!window.APEXCORE || !regContainer) return;
    try {
      const reg = APEXCORE.api.dump();
      regContainer.textContent = JSON.stringify(reg, null, 2);
    } catch (err) {
      regContainer.textContent = "// registry error: " + err.message;
    }
  }

  function renderProfiler() {
    if (!window.APEXCORE || !profilerContainer) return;
    try {
      const prof = APEXCORE.api.get("profiler") || {};
      profilerContainer.textContent = JSON.stringify(prof, null, 2);
    } catch (err) {
      profilerContainer.textContent = "// profiler error: " + err.message;
    }
  }

  function renderHaloHUD() {
    if (!window.APEXCORE) return;
    try {
      haloAgentCount.textContent = APEXCORE.api.get("halo.agents") ?? "—";
      haloFormation.textContent = APEXCORE.api.get("halo.formation") ?? "—";
      haloLastUpdate.textContent = APEXCORE.api.get("halo.lastUpdate") ?? "—";
    } catch (err) {}
  }

  setInterval(() => {
    renderRegistry();
    renderProfiler();
    renderHaloHUD();
  }, 250);

  console.log("[APEXOPS] UI initialized.");
})();
</script>
