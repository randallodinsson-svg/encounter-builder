<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXSIM — Encounter Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prevent favicon 404 -->
    <link rel="icon" href="data:,">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #ui-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
            color: #fff;
        }

        button {
            background: #1e88e5;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        button:hover {
            background: #42a5f5;
        }

        #debug-panel {
            position: fixed;
            bottom: 70px;
            left: 10px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.7);
            color: #0ff;
            font-size: 12px;
            border-radius: 4px;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <canvas id="apex-canvas"></canvas>

    <div id="ui-bar">
        <button data-ui="reset">Reset</button>
        <button data-ui="play">Play</button>
        <button data-ui="pause">Pause</button>

        <button data-ui="cam-free">Free Cam</button>
        <button data-ui="cam-follow">Follow Cam</button>
        <button data-ui="cam-chase">Chase</button>
        <button data-ui="cam-low">Low Angle</button>
        <button data-ui="cam-shoulder">Shoulder</button>

        <button data-ui="record-start">Start Rec</button>
        <button data-ui="record-stop">Stop Rec</button>
    </div>

    <div id="debug-panel">
        APEXSIM - DEBUG<br>
        fps: -<br>
        phase: -<br>
        tick: -
    </div>

    <!-- Your engine bootstrap -->
    <script type="module" src="./index.js"></script>
</body>
</html>
