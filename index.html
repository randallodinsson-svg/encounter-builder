<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>APEXCORE v4.4 — Phase 24: Operator Influence Layer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #haloCanvas { z-index: 1; }
    #simCanvas { z-index: 0; opacity: 0; }
    #diagCanvas { z-index: 2; pointer-events: none; }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 12px;
      line-height: 1.4;
      z-index: 10;
    }

    .controls {
      position: fixed;
      bottom: 16px;
      left: 16px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 13px;
      z-index: 10;
    }

    .controls button {
      margin: 4px 6px 4px 0;
      padding: 6px 10px;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      cursor: pointer;
    }

    .controls button:hover {
      background: #333;
    }

    #overlay-root {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
  </style>
</head>

<body>

  <canvas id="simCanvas"></canvas>
  <canvas id="haloCanvas"></canvas>
  <canvas id="diagCanvas"></canvas>

  <div class="hud">
    APEXCORE v4.4 — Phase 24: Operator Influence Layer<br/>
    <span id="hud-fps">FPS: --</span><br/>
    <span id="hud-count">Particles: --</span>
  </div>

  <div class="controls">
    <button data-ui="reset">Reset</button>
    <button data-ui="burst">Burst</button>

    <button data-ui="preset-calm">Calm</button>
    <button data-ui="preset-drift">Drift</button>
    <button data-ui="preset-swirl">Swirl</button>
    <button data-ui="preset-storm">Storm</button>
    <button data-ui="preset-collapse">Collapse</button>
    <button data-ui="preset-pulse">Pulse</button>

    <button data-ui="halo-binary">Binary Pair</button>
    <button data-ui="halo-triple">Triple Orbit</button>
    <button data-ui="halo-ring">Ring of 6</button>
    <button data-ui="halo-net">Swarm Net</button>
    <button data-ui="halo-collapse">Collapse Core</button>
  </div>

  <div id="overlay-root"></div>

  <!-- CORE + ENGINE -->

  <!-- PHASE 7 -->

  <!-- PHASE 22 -->
