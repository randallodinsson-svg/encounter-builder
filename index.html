<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APEXCORE — Encounter Builder</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }

        #haloCanvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* UI container */
        #uiContainer {
            position: absolute;
            top: 0;
            right: 0;
            width: 320px;
            height: 100vh;
            background: rgba(20, 20, 20, 0.85);
            color: #fff;
            padding: 12px;
            overflow-y: auto;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <!-- Simulation Canvas -->
    <canvas id="haloCanvas"></canvas>

    <!-- UI Panel -->
    <div id="uiContainer"></div>

    <!-- APEXCORE + Modules -->
    <script src="core.js"></script>
    <script src="apexcore.js"></script>

    <script src="engine.js"></script>
    <script src="entities.js"></script>
    <script src="formations.js"></script>
    <script src="formation-ai.js"></script>
    <script src="auto-spawn.js"></script>

    <script src="halo-renderer.js"></script>

    <script src="apexsim.js"></script>
    <script src="apexsim-renderer.js"></script>

    <script src="overlay.js"></script>
    <script src="tick-profiler.js"></script>
    <script src="event-timeline-visualizer.js"></script>
    <script src="diag-fps-graph.js"></script>
    <script src="debug-console.js"></script>
    <script src="render-stats.js"></script>

    <script src="apex-ui.js"></script>

    <!-- ⭐ DOM-READY BOOT FIX -->
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        APEX.start();
    });
    </script>

</body>
</html>
