<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>APEXSIM Sanity Check</title>
  <style>
    body { margin: 0; background: #05070a; color: #eee; font-family: system-ui; }
    #simCanvas { background: #111822; display: block; margin: 20px auto; }
    #startBtn { display: block; margin: 20px auto; padding: 10px 20px; }
  </style>
</head>
<body>
  <button id="startBtn">START SANITY CHECK</button>
  <canvas id="simCanvas" width="900" height="600"></canvas>

  <script>
    console.log("HTML is alive.");

    const canvas = document.getElementById("simCanvas");
    const ctx = canvas.getContext("2d");

    document.getElementById("startBtn").addEventListener("click", () => {
      console.log("Button works.");
      ctx.fillStyle = "lime";
      ctx.fillRect(100, 100, 200, 150);
    });
  </script>
</body>
</html>
