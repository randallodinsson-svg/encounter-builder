<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>APEXCORE v4.4 — NUKE BASELINE</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    #haloCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 12px;
      line-height: 1.4;
    }

    .controls {
      position: fixed;
      bottom: 16px;
      left: 16px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 13px;
    }

    .controls button {
      margin: 4px 6px 4px 0;
      padding: 6px 10px;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      cursor: pointer;
    }

    .controls button:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <!-- MAIN CANVAS -->
  <canvas id="haloCanvas"></canvas>

  <!-- HUD -->
  <div class="hud">
    APEXCORE v4.4 — NUKE BASELINE<br/>
    <span id="hud-fps">FPS: --</span><br/>
    <span id="hud-count">Particles: --</span>
  </div>

  <!-- CONTROL PANEL -->
  <div class="controls">
    <button data-ui="reset">Reset</button>
    <button data-ui="burst">Burst</button>

    <!-- Phase 4 Preset Buttons -->
    <button data-ui="preset-calm">Calm</button>
    <button data-ui="preset-drift">Drift</button>
    <button data-ui="preset-swirl">Swirl</button>
    <button data-ui="preset-storm">Storm</button>
    <button data-ui="preset-collapse">Collapse</button>
    <button data-ui="preset-pulse">Pulse</button>
  </div>

  <!-- =============================== -->
  <!--  APEXCORE v4.4 — MODULE STACK   -->
  <!-- =============================== -->

  <!-- CORE + ENGINE -->
  <script src="core.js"></script>
  <script src="apexcore-engine.js"></script>

  <!-- SIMULATION LAYER -->
  <script src="apexsim.js"></script>
  <script src="apexsim-renderer.js"></script>

  <!-- PHASE 1 MODULES -->
  <script src="entities.js"></script>
  <script src="apexops.js"></script>

  <!-- PHASE 2 MODULES -->
  <script src="environment-field.js"></script>
  <script src="halo-field.js"></script>
  <script src="halo-renderer.js"></script>

  <!-- PHASE 4 MODULE -->
  <script src="field-controller.js"></script>

  <!-- UI MUST LOAD LAST -->
  <script src="apex-ui.js"></script>

</body>
</html>
