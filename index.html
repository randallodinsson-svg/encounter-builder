<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>APEXCORE Platform — System Hub</title>

    <style>
        body {
            margin: 0;
            background: #0b0e13;
            color: #e6eef7;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #11161d;
            padding: 20px;
            border-bottom: 1px solid #1f2732;
            font-size: 22px;
            font-weight: 600;
        }

        #container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            background: #11161d;
            border-right: 1px solid #1f2732;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .nav-btn {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            background: #1e90ff;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
        }

        .nav-btn:hover {
            background: #3aa0ff;
        }

        #main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
            background: #05070a;
            font-family: Consolas, monospace;
            white-space: pre-wrap;
            border-left: 1px solid #1f2732;
        }
    </style>
</head>

<body>

<header>APEXCORE Platform — System Hub</header>

<div id="container">

    <div id="sidebar">
        <button class="nav-btn" onclick="go('core-shell.html')">APEXCORE — System Shell</button>
        <button class="nav-btn" onclick="go('apexai.html')">APEXAI — Scenario Engine</button>
        <button class="nav-btn" onclick="go('apexsim.html')">APEXSIM — Simulation Engine</button>
        <button class="nav-btn" onclick="go('apexops.html')">APEXOPS — Runtime Inspector</button>
    </div>

    <div id="main">
        APEXCORE Platform initialized.
        <br><br>
        Select a module from the left to begin.
    </div>

</div>

<script>
    function go(page) {
        window.location.href = page;
    }
</script>

</body>
</html>
