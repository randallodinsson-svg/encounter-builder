<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>APEXCORE v4.4 — NUKE BASELINE (Phase 11)</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      height: 100%;
      width: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    #haloCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 12px;
      line-height: 1.4;
    }

    .controls {
      position: fixed;
      bottom: 16px;
      left: 16px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 13px;
    }

    .controls button {
      margin: 4px 6px 4px 0;
      padding: 6px 10px;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      cursor: pointer;
    }

    .controls button:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <!-- MAIN SIM CANVAS -->
  <canvas id="haloCanvas"></canvas>

  <!-- HUD -->
  <div class="hud">
    APEXCORE v4.4 — NUKE BASELINE (Phase 11)<br/>
    <span id="hud-fps">FPS: --</span><br/>
    <span id="hud-count">Particles: --</span>
  </div>

  <!-- CONTROL PANEL -->
  <div class="controls">
    <button data-ui="reset">Reset</button>
    <button data-ui="burst">Burst</button>

    <button data-ui="preset-calm">Calm</button>
    <button data-ui="preset-drift">Drift</button>
    <button data-ui="preset-swirl">Swirl</button>
    <button data-ui="preset-storm">Storm</button>
    <button data-ui="preset-collapse">Collapse</button>
    <button data-ui="preset-pulse">Pulse</button>

    <button data-ui="halo-binary">Binary Pair</button>
    <button data-ui="halo-triple">Triple Orbit</button>
    <button data-ui="halo-ring">Ring of 6</button>
    <button data-ui="halo-net">Swarm Net</button>
    <button data-ui="halo-collapse">Collapse Core</button>
  </div>

  <!-- ===================================================== -->
  <!--  APEXCORE v4.4 — MODULE STACK (Phase 11 Integrated)   -->
  <!-- ===================================================== -->

  <!-- CORE + ENGINE -->
  <script src="core.js"></script>
  <script src="apexcore-engine.js"></script>

  <!-- SIMULATION -->
  <script src="apexsim.js"></script>
  <script src="apexsim-renderer.js"></script>

  <!-- PHASE 1 -->
  <script src="entities.js"></script>
  <script src="apexops.js"></script>

  <!-- PHASE 2 -->
  <script src="environment-field.js"></script>
  <script src="halo-field.js"></script>
  <script src="halo-renderer.js"></script>

  <!-- PHASE 4 -->
  <script src="field-controller.js"></script>

  <!-- PHASE 5 -->
  <script src="field-visualizer.js"></script>

  <!-- PHASE 6 -->
  <script src="field-animator.js"></script>

  <!-- PHASE 7 -->
  <script src="halo-system.js"></script>

  <!-- PHASE 10 -->
  <script src="influence-maps.js"></script>

  <!-- PHASE 11 -->
  <script src="formation-morphing.js"></script>

  <!-- FORMATION INTELLIGENCE (Phase 9 + 10 + 11) -->
  <script src="formation-commands.js"></script>
  <script src="formation-ai.js"></script>
  <script src="formation-renderer.js"></script>

  <!-- UI LAST -->
  <script src="apex-ui.js"></script>

</body>
</html>
