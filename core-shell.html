<!-- APEXSIM CONTROL PANEL -->
<div id="apexsim-controls" style="
  margin-top:20px;
  padding:14px;
  border:1px solid #222;
  background:#0d1117;
  font-size:12px;
  color:#ccc;
  line-height:1.4;
">

  <div style="font-size:13px; margin-bottom:10px; color:#7fffd4; font-weight:bold;">
    APEXSIM Controls
  </div>

  <label style="display:flex; align-items:center; margin-bottom:8px;">
    <input type="checkbox" id="sim-toggle-glow" checked style="margin-right:6px;">
    Glow
  </label>

  <label style="display:flex; align-items:center; margin-bottom:8px;">
    <input type="checkbox" id="sim-toggle-trails" checked style="margin-right:6px;">
    Trails
  </label>

  <label style="display:flex; align-items:center; margin-bottom:8px;">
    <input type="checkbox" id="sim-toggle-debug" checked style="margin-right:6px;">
    Debug Vectors
  </label>

</div>
